<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iWeather</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="app-header">
        <img
          src="https://cdn-icons-png.flaticon.com/512/869/869869.png"
          alt="Sun icon"
          class="header-sun"
        />
        <h1 class="main-title">Sprawdź pogodę</h1>
      </div>

      <div class="weather-card">
        <div class="search-box">
          <input
            type="text"
            id="cityInput"
            placeholder="Szukaj miasta..."
            autocomplete="off"
          />
          <button id="searchBtn">➔</button>
        </div>

        <div id="weatherResult" class="content hidden">
          <h2 id="cityName">Warszawa</h2>
          <p id="localTime">Pobieranie czasu...</p>
          <div class="icon-container">
            <img id="weatherIcon" src="" alt="" />
          </div>
          <h3 id="temperature">--°C</h3>
          <p id="description">--</p>
        </div>

        <div id="loader" class="hidden">Szukam...</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
