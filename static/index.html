<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iWeather</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app-container">
      <!-- Block: App Header -->
      <header class="app-header">
        <img
          src="https://cdn-icons-png.flaticon.com/512/869/869869.png"
          alt="Sun icon"
          class="app-header__icon"
        />
        <h1 class="app-header__title">Check Weather</h1>
      </header>

      <!-- Block: Weather Card -->
      <article class="weather-card">
        <!-- Block: Search Bar (nested in Card) -->
        <div class="search-bar">
          <input
            type="text"
            id="cityInput"
            class="search-bar__input"
            placeholder="Search city..."
            autocomplete="off"
          />
          <button id="searchBtn" class="search-bar__button">➔</button>
        </div>

        <!-- Elements of Weather Card -->
        <div id="weatherResult" class="weather-card__content u-hidden">
          <h2 id="cityName" class="weather-card__city-name">Warsaw</h2>
          <p id="localTime" class="weather-card__time">Loading time...</p>

          <div class="weather-card__icon-container">
            <img
              id="weatherIcon"
              src=""
              alt="Weather Icon"
              class="weather-card__icon"
            />
          </div>

          <h3 id="temperature" class="weather-card__temp">--°C</h3>
          <p id="description" class="weather-card__desc">--</p>
        </div>

        <!-- Loader State -->
        <div id="loader" class="weather-card__loader u-hidden">
          Searching...
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
